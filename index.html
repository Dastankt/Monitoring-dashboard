<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob--1"></div>
    <div class="blob blob--2"></div>
    <div class="blob blob--3"></div>
  </div>
  <div class="dashboard">
    <header class="header">
      <div class="header-left">
        <h1 class="logo">Office<span>Board</span></h1>
        <div id="refresh-indicator" class="refresh-indicator" title="Обновление данных">
          <span class="spinner"></span>
        </div>
      </div>
      <div class="header-center">
        <div id="clock-time" class="clock-time">00:00:00</div>
        <div id="clock-date" class="clock-date">—</div>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="theme-toggle" aria-label="Переключить тему">☀️</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="overview">Обзор</button>
      <button class="tab-btn" data-tab="charts">Графики</button>
      <button class="tab-btn" data-tab="news">Новости</button>
    </nav>

    <main class="content">
      <!-- Tab: Overview -->
      <div class="tab-panel active" data-panel="overview">
        <div class="grid">
          <section class="widget widget--weather">
            <div class="widget-header">
              <h2 class="widget-title">🌤 Погода · Бишкек</h2>
              <span id="weather-status" class="widget-status">—</span>
            </div>
            <div id="weather-content" class="widget-body loading">
              <div class="skeleton"></div>
            </div>
          </section>

          <section class="widget widget--currency">
            <div class="widget-header">
              <h2 class="widget-title">💱 Курсы валют</h2>
              <span id="currency-status" class="widget-status">—</span>
            </div>
            <div id="currency-content" class="widget-body loading">
              <div class="skeleton"></div>
            </div>
          </section>

          <section class="widget widget--news-preview">
            <div class="widget-header">
              <h2 class="widget-title">📰 Новости · Кыргызстан</h2>
              <span id="news-status" class="widget-status">—</span>
            </div>
            <div id="news-content" class="widget-body loading">
              <div class="skeleton"></div>
            </div>
          </section>
        </div>
      </div>

      <!-- Tab: Charts -->
      <div class="tab-panel" data-panel="charts">
        <div class="grid grid--charts">
          <section class="widget widget--large">
            <div class="widget-header">
              <h2 class="widget-title">📈 Прогноз температуры</h2>
            </div>
            <div class="widget-body chart-container">
              <canvas id="temperatureChart"></canvas>
            </div>
          </section>

          <section class="widget">
            <div class="widget-header">
              <h2 class="widget-title">📊 Курсы к USD</h2>
            </div>
            <div class="widget-body chart-container">
              <canvas id="currencyChart"></canvas>
            </div>
          </section>
        </div>
      </div>

      <!-- Tab: News -->
      <div class="tab-panel" data-panel="news">
        <section class="widget widget--full">
          <div class="widget-header">
            <h2 class="widget-title">📰 Новости · Кыргызстан</h2>
            <span id="news-status-tab" class="widget-status">—</span>
          </div>
          <div id="news-content-tab" class="widget-body loading">
            <div class="skeleton"></div>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <span>Автообновление каждые 60 сек</span>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
